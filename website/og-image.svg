<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">

  <!-- ── Background ── -->
  <rect width="1200" height="630" fill="#f7f0e3"/>

  <!-- Subtle dot-grid overlay -->
  <defs>
    <pattern id="dots" x="0" y="0" width="28" height="28" patternUnits="userSpaceOnUse">
      <circle cx="14" cy="14" r="1.1" fill="#211608" opacity="0.055"/>
    </pattern>
    <!-- Radial fade mask so dots vanish toward edges -->
    <radialGradient id="fade" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="dotmask">
      <rect width="1200" height="630" fill="url(#fade)"/>
    </mask>
  </defs>
  <rect width="1200" height="630" fill="url(#dots)" mask="url(#dotmask)"/>

  <!-- ── Left content block ── -->

  <!-- Wordmark: "axiom" — "m" in amber -->
  <text
    x="80" y="246"
    font-family="Georgia, 'Playfair Display', 'Times New Roman', serif"
    font-size="116" font-weight="700" letter-spacing="-3"
    fill="#211608"
  >axio<tspan fill="#b45309">m</tspan></text>

  <!-- Tagline -->
  <text
    x="82" y="306"
    font-family="'Inter', system-ui, -apple-system, sans-serif"
    font-size="28" font-weight="400" letter-spacing="0.3"
    fill="#3f3f46"
  >AI agent library for developers</text>

  <!-- Pill badges -->
  <!-- Pill 1: 18+ agents -->
  <rect x="82" y="338" width="184" height="34" rx="17" fill="rgba(180,83,9,0.11)"/>
  <text
    x="174" y="360"
    font-family="'Inter', system-ui, sans-serif"
    font-size="14" font-weight="600" letter-spacing="0.4"
    fill="#b45309" text-anchor="middle"
  >18+ production-ready agents</text>

  <!-- Pill 2: One command -->
  <rect x="278" y="338" width="132" height="34" rx="17" fill="rgba(5,150,105,0.10)"/>
  <text
    x="344" y="360"
    font-family="'Inter', system-ui, sans-serif"
    font-size="14" font-weight="600" letter-spacing="0.4"
    fill="#059669" text-anchor="middle"
  >One command</text>

  <!-- Divider line in amber -->
  <rect x="82" y="406" width="140" height="2.5" rx="1.5" fill="#b45309" opacity="0.55"/>

  <!-- URL -->
  <text
    x="82" y="450"
    font-family="'JetBrains Mono', 'Courier New', monospace"
    font-size="17" fill="#71717a" letter-spacing="0.2"
  >axiomcm.vercel.app</text>

  <!-- ── Right: abstract agent-network visualization ── -->
  <!-- Connection lines (drawn first so nodes sit on top) -->
  <g opacity="1">
    <!-- outer ring connections -->
    <line x1="900" y1="148" x2="1050" y2="198" stroke="#b45309" stroke-width="1.4" opacity="0.22"/>
    <line x1="1050" y1="198" x2="1110" y2="345" stroke="#b45309" stroke-width="1.4" opacity="0.18"/>
    <line x1="1110" y1="345" x2="1020" y2="470" stroke="#211608" stroke-width="1.4" opacity="0.13"/>
    <line x1="1020" y1="470" x2="858"  y2="455" stroke="#211608" stroke-width="1.4" opacity="0.13"/>
    <line x1="858"  y1="455" x2="790"  y2="330" stroke="#211608" stroke-width="1.4" opacity="0.13"/>
    <line x1="790"  y1="330" x2="840"  y2="195" stroke="#059669" stroke-width="1.4" opacity="0.20"/>
    <line x1="840"  y1="195" x2="900"  y2="148" stroke="#059669" stroke-width="1.4" opacity="0.20"/>

    <!-- inner cross-connections to centre -->
    <line x1="960" y1="315" x2="900"  y2="148" stroke="#b45309" stroke-width="1.2" opacity="0.18"/>
    <line x1="960" y1="315" x2="1050" y2="198" stroke="#b45309" stroke-width="1.2" opacity="0.18"/>
    <line x1="960" y1="315" x2="1110" y2="345" stroke="#211608" stroke-width="1.2" opacity="0.12"/>
    <line x1="960" y1="315" x2="1020" y2="470" stroke="#211608" stroke-width="1.2" opacity="0.12"/>
    <line x1="960" y1="315" x2="858"  y2="455" stroke="#211608" stroke-width="1.2" opacity="0.12"/>
    <line x1="960" y1="315" x2="790"  y2="330" stroke="#059669" stroke-width="1.2" opacity="0.17"/>
    <line x1="960" y1="315" x2="840"  y2="195" stroke="#059669" stroke-width="1.2" opacity="0.17"/>
  </g>

  <!-- Outer nodes -->
  <!-- node: top-centre -->
  <circle cx="900"  cy="148" r="22" fill="#b45309" opacity="0.10"/>
  <circle cx="900"  cy="148" r="10" fill="#b45309" opacity="0.85"/>

  <!-- node: top-right -->
  <circle cx="1050" cy="198" r="20" fill="#b45309" opacity="0.10"/>
  <circle cx="1050" cy="198" r="9"  fill="#b45309" opacity="0.65"/>

  <!-- node: right -->
  <circle cx="1110" cy="345" r="20" fill="#211608" opacity="0.08"/>
  <circle cx="1110" cy="345" r="9"  fill="#211608" opacity="0.35"/>

  <!-- node: bottom-right -->
  <circle cx="1020" cy="470" r="20" fill="#211608" opacity="0.08"/>
  <circle cx="1020" cy="470" r="9"  fill="#211608" opacity="0.30"/>

  <!-- node: bottom-left -->
  <circle cx="858"  cy="455" r="20" fill="#059669" opacity="0.10"/>
  <circle cx="858"  cy="455" r="9"  fill="#059669" opacity="0.55"/>

  <!-- node: left -->
  <circle cx="790"  cy="330" r="20" fill="#059669" opacity="0.10"/>
  <circle cx="790"  cy="330" r="9"  fill="#059669" opacity="0.55"/>

  <!-- node: top-left -->
  <circle cx="840"  cy="195" r="20" fill="#059669" opacity="0.10"/>
  <circle cx="840"  cy="195" r="9"  fill="#059669" opacity="0.55"/>

  <!-- Centre hub (largest) -->
  <circle cx="960" cy="315" r="34" fill="#b45309" opacity="0.08"/>
  <circle cx="960" cy="315" r="20" fill="#b45309" opacity="0.12"/>
  <circle cx="960" cy="315" r="12" fill="#b45309" opacity="0.90"/>

  <!-- Centre label -->
  <text
    x="960" y="365"
    font-family="'Inter', system-ui, sans-serif"
    font-size="13" font-weight="500" letter-spacing="0.6"
    fill="#b45309" opacity="0.6" text-anchor="middle"
  >agents</text>

</svg>
