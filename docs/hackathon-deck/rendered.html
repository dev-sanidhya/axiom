<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>axiom Hackathon Deck Rendered</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        background: #ffffff;
      }

      .page {
        width: 13.333in;
        height: 7.5in;
        margin: 0;
        padding: 0;
        overflow: hidden;
        break-after: page;
        page-break-after: always;
      }

      img {
        display: block;
        width: 13.333in;
        height: 7.5in;
        object-fit: cover;
      }

      @page {
        size: 13.333in 7.5in;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <section class="page"><img src="./export/slide-01.png" alt="Slide 1" /></section>
    <section class="page"><img src="./export/slide-02.png" alt="Slide 2" /></section>
    <section class="page"><img src="./export/slide-03.png" alt="Slide 3" /></section>
    <section class="page"><img src="./export/slide-04.png" alt="Slide 4" /></section>
    <section class="page"><img src="./export/slide-05.png" alt="Slide 5" /></section>
    <section class="page"><img src="./export/slide-06.png" alt="Slide 6" /></section>
    <section class="page"><img src="./export/slide-07.png" alt="Slide 7" /></section>
  </body>
</html>
